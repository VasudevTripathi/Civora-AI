version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: civora_backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - LOG_LEVEL=DEBUG
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ../:/workspace
    restart: always
